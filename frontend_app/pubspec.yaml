name: homies_mobile
description: "HOMIES — shared-housing management for Australian rentals"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  go_router: ^14.6.2
  shared_preferences: ^2.3.3
  intl: ^0.20.1
  file_picker: ^8.1.6
  uuid: ^4.5.1
  firebase_core: ^4.12.1
  firebase_auth: ^6.5.6
  cloud_firestore: ^6.7.1
  firebase_storage: ^13.4.5
  image_picker: ^1.2.2
  record: ^6.2.1
  audioplayers: ^6.7.1
  video_player: ^2.11.0
  path_provider: ^2.1.6 
  flutter_local_notifications: ^22.0.1
  timezone: ^0.11.1
  flutter_timezone: ^5.1.0
  pdf: ^3.11.0
  printing: ^5.13.0
  share_plus: ^10.0.0
  url_launcher: ^6.3.1
  http: ^1.6.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true

# Launcher icons — generated from assets/icon/app_icon.png via:
#   dart run flutter_launcher_icons
# FIRST-PASS BRAND MARK: a white "L" monogram on the Leasely sage-green accent
# (HomiesColors.accent). Replace app_icon.png with final design art and re-run
# the generator when branding is finalised. Bundle id: com.leasely.mobile.
flutter_launcher_icons:
  android: true
  ios: true
  remove_alpha_ios: true
  image_path: "assets/icon/app_icon.png"
