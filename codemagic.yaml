workflows:
  ios-release:
    name: iOS Release
    max_build_duration: 60
    instance_type: mac_mini_m2
    working_directory: frontend_app

    integrations:
      app_store_connect: Leasely

    environment:
      groups:
        - ios_signing
      vars:
        BUNDLE_ID: "com.kai.poems"
        APP_STORE_APPLE_ID: 6781926631
      flutter: stable
      xcode: latest
      cocoapods: default

    scripts:
      - name: Get Flutter packages
        script: flutter pub get

      - name: Install CocoaPods dependencies
        script: |
          find . -name "Podfile" -execdir pod install \;

      - name: Set up code signing (creates certificate + profile)
        script: |
          set -e
          keychain initialize
          echo "$CERTIFICATE_PRIVATE_KEY" | base64 --decode > /tmp/cert_key
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --platform IOS \
            --type IOS_APP_STORE \
            --certificate-key=@file:/tmp/cert_key \
            --create
          keychain add-certificates
          xcode-project use-profiles
          echo "=== Identities in keychain ==="
          security find-identity -v -p codesigning
          echo "=== Export options plist ==="
          cat $HOME/export_options.plist || echo "WARNING: export_options.plist not found"

      - name: Set build number (handles first-ever build)
        script: |
          LATEST=$(app-store-connect get-latest-testflight-build-number "$APP_STORE_APPLE_ID" 2>/dev/null || echo "0")
          if [ -z "$LATEST" ]; then LATEST=0; fi
          echo "BUILD_NUMBER=$((LATEST + 1))" >> "$CM_ENV"

      - name: Build signed IPA
        script: |
          flutter build ipa --release \
            --build-name=1.0.0 \
            --build-number=$BUILD_NUMBER \
            --export-options-plist=/Users/builder/export_options.plist

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        submit_to_app_store: false

  android-release:
    name: Android Release
    max_build_duration: 60
    instance_type: linux_x2
    working_directory: frontend_app

    environment:
      groups:
        # Create this group in Codemagic (Settings > Environment variables)
        # with: CM_KEYSTORE (base64 of upload-keystore.jks), CM_KEYSTORE_PASSWORD,
        # CM_KEY_ALIAS, CM_KEY_PASSWORD. Mark all four as secret. Never commit
        # the keystore or these values to the repo.
        - android_signing
      vars:
        PACKAGE_NAME: "au.com.creyeti.homies_mobile"
      flutter: stable

    scripts:
      - name: Get Flutter packages
        script: flutter pub get

      - name: Set up Android release signing
        script: |
          set -e
          echo "$CM_KEYSTORE" | base64 --decode > android/upload-keystore.jks
          cat <<EOF > android/key.properties
          storePassword=$CM_KEYSTORE_PASSWORD
          keyPassword=$CM_KEY_PASSWORD
          keyAlias=$CM_KEY_ALIAS
          storeFile=upload-keystore.jks
          EOF

      - name: Build signed App Bundle
        script: |
          flutter build appbundle --release

    artifacts:
      - build/**/outputs/**/*.aab
      - build/**/outputs/**/mapping.txt

    # No `publishing:` block yet — this workflow builds and signs a .aab you
    # can download from the Codemagic build artifacts and upload to Play
    # Console manually. To have Codemagic publish directly, set up a Google
    # Play service-account integration (Settings > Integrations > Google
    # Play), add its credentials as GCLOUD_SERVICE_ACCOUNT_CREDENTIALS, then
    # add:
    #   publishing:
    #     google_play:
    #       credentials: $GCLOUD_SERVICE_ACCOUNT_CREDENTIALS
    #       track: internal
    #       submit_as_draft: true
