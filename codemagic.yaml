workflows:
  ios-release:
    name: iOS Release
    max_build_duration: 60
    instance_type: mac_mini_m2

    integrations:
      # 👇 REPLACE with the exact NAME you gave your key in Codemagic
      app_store_connect: Leasely

    environment:
      ios_signing:
        distribution_type: app_store
        # 👇 REPLACE with your Leasely bundle ID
        bundle_identifier: com.kai.poems
      vars:
        # 👇 REPLACE with the numeric Apple ID from App Information
        APP_STORE_APPLE_ID: 6781926631
      flutter: stable
      xcode: latest
      cocoapods: default

    scripts:
      - name: Get Flutter packages
        script: flutter pub get

      - name: Install CocoaPods dependencies
        script: |
          find . -name "Podfile" -execdir pod install \;

      - name: Set up code signing
        script: xcode-project use-profiles

      - name: Auto-increment build number
        script: |
          LATEST=$(app-store-connect get-latest-app-store-build-number "$APP_STORE_APPLE_ID")
          echo "BUILD_NUMBER=$((LATEST + 1))" >> "$CM_ENV"

      - name: Build signed IPA
        script: |
          flutter build ipa --release \
            --build-name=1.0.0 \
            --build-number=$BUILD_NUMBER \
            --export-options-plist=/Users/builder/export_options.plist

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        submit_to_app_store: false